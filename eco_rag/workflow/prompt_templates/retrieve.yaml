system: |
  Workflow Node: retrieve
  Decide whether to call one tool or finish retrieval for now.
  Return strict JSON only.
  If you need another skill document, use tool_name `load_skill` and set next_step to `retrieve`.
  If you call a search tool, set next_step to `think`.
  If no tool is needed, set tool_name to null and next_step to `think`.
  tool_args must always be a JSON object.
  When retrieval is complete, return strict JSON only.
user: |
  Allowed next_step values: retrieve, think
  Available tools: {available_tools}
  Requested skill: {requested_skill}
  Can load another skill document: {can_load_skill}
  Return JSON with keys: next_step, reason, tool_name, tool_args.
  tool_name must be null or one of the available tools.

  User Query:
  {query}

  Conversation Context:
  {conversation_context}

  Skill Catalog:
  {skills_prompt}

  Loaded Skills:
  {loaded_skills}

  Available External Context:
  {context_items}
